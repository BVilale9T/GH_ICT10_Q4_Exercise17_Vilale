<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- PyScript -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css" />
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>

    <title>Object Oriented Programming</title>
</head>
<body>
    <form>
        <input type="text" id="name" placeholder="Name of dog:">
        <br>
        <br>
        <input type="text" id="breed" placeholder="Breed of dog:">
        <br>
        <br>
        <input type="text" id="age" placeholder="Age of dog:">
        <br>
        <br>
        <input type="text" id="owner" placeholder="Owner of dog:">
        <br>
        <br>
        <input type="button" id="Submit" py-click="Submit" value="Submit">
    </form>

    <div id="output1"></div>
    <py-script src="main.py"></py-script>
</body>
</html>
